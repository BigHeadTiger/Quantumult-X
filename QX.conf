[general]

# > 用于节点延迟测试
server_check_url= http://www.gstatic.com/generate_204
# > 服务器测试超时时间 (毫秒)
server_check_timeout = 5000
# > 用于设置图标显示
profile_img_url=https://github.githubassets.com/images/modules/site/integrators/google.png
# > 用于Check节点IP地址
# geo_location_checker = http://ip-api.com/json/?lang=zh-CN, https://raw.githubusercontent.com/Centralmatrix3/Network/master/Scripts/IP-API/IP-API.js
geo_location_checker=http://ip-api.com/json/?lang=zh-CN, https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/IP_API.js
# > 功能强大的解析器，用于引用资源的转换
resource_parser_url=https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/resource-parser.js
# > 下列路径将不经过QuanX的处理
excluded_routes=239.255.255.250/32, 24.105.30.129/32, 185.60.112.157/32, 185.60.112.158/32, 182.162.132.1/32
# > dns_exclusion_list
dns_exclusion_list=*.10099.com.cn, *.cmpassport.com, *.jegotrip.com.cn, *.icitymobile.mobi, id6.me, *.pingan.com.cn
# UDP回退策略
fallback_udp_policy = reject
# > udp_drop_list 可直接屏蔽 STUN、QUIC 等协议的数据包
udp_drop_list = 443, STUN, QUIC

[dns]
no-ipv6
no-system
prefer-doh3
doq-server = quic://dns.alidns.com
doh-server = https://dns.alidns.com/dns-query
server=/*.alidns.com/223.5.5.5
server=/*.tencent.com/119.29.29.29
server=/*.weixin.com/119.29.29.29

[policy]
static=Emby, proxy, direct, US-VLESS+Reality, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Emby.png

[server_local]

[server_remote]

[filter_local]
# > local
ip-cidr, 10.0.0.0/8, direct,no-resolve
ip-cidr, 127.0.0.0/8, direct,no-resolve
ip-cidr, 172.16.0.0/12, direct,no-resolve
ip-cidr, 192.168.0.0/16, direct,no-resolve
ip-cidr, 224.0.0.0/24, direct,no-resolve
ip-cidr, 182.254.116.0/24, direct,no-resolve
GEOIP, CN, DIRECT, no-resolve
HOST-KEYWORD, ., PROXY, no-resolve
FINAL, PROXY

